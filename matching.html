<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matching Engine</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2 class="logo">Collivio</h2>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="workspace.html">Workspace</a>
      <a href="org.html">Org Panel</a>
      <a href="verification.html">Verification</a>
    </div>
  </nav>

  <div class="container">

    <h2>Matching Engine</h2>
    <p>Select your preferences to find ideal teammates</p>

    <!-- FORM -->
    <div class="card">
      <h3>Select Skills</h3>
      <label><input type="checkbox" value="Frontend"> Frontend</label><br>
      <label><input type="checkbox" value="Backend"> Backend</label><br>
      <label><input type="checkbox" value="AI"> AI</label><br>
      <label><input type="checkbox" value="Marketing"> Marketing</label><br>
    </div>

    <div class="card">
      <h3>Select Interests</h3>
      <label><input type="checkbox" value="Startups"> Startups</label><br>
      <label><input type="checkbox" value="Research"> Research</label><br>
      <label><input type="checkbox" value="Design"> Design</label><br>
    </div>

    <div class="card">
      <h3>Availability</h3>
      <select id="availability">
        <option>5 hrs/week</option>
        <option>10 hrs/week</option>
        <option>20 hrs/week</option>
      </select>
    </div>

    <button onclick="runMatching()">Find Matches</button>

    <!-- RESULTS -->
    <div id="results" class="cards"></div>

  </div>

  <script src="js/app.js"></script>

</body>
</html>

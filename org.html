<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Organization Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2 class="logo">Collivio</h2>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="matching.html">Matching</a>
      <a href="verification.html">Verification</a>
    </div>
  </nav>

  <div class="container">

    <h2>Organization Challenge Panel</h2>
    <p>Create real-world challenges for student teams</p>

    <!-- FORM -->
    <div class="card">
      <h3>Create Challenge</h3>
      <input id="problem" placeholder="Enter problem statement..." />
      <input id="duration" placeholder="Duration (e.g. 4 weeks)" />
      <button onclick="createChallenge()">Launch Challenge</button>
    </div>

    <!-- OUTPUT -->
    <div id="teams" class="cards"></div>

    <!-- EXISTING DEMO -->
    <div class="section">
      <h2>Sample Challenges</h2>

      <div class="cards">
        <div class="card">
          <h3>GreenFuture NGO</h3>
          <p>Reduce plastic usage among teens</p>
          <span style="color:#38bdf8;">✔ Live Challenge</span>
        </div>

        <div class="card">
          <h3>EdTech Startup</h3>
          <p>Build gamified learning prototype</p>
          <span style="color:#38bdf8;">✔ Live Challenge</span>
        </div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>

</body>
</html>
